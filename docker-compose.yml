version: '3.8'

services:
  agent-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_NAME=${DB_NAME:-alarm}
      - MODEL_API_KEY=${SILICONFLOW_API_KEY}
      - MODEL_BASE_URL=https://api.siliconflow.cn/v1
      - MODEL_MODEL_NAME=deepseek-ai/DeepSeek-V3
      - LOG_LEVEL=INFO
    depends_on:
      - mysql
    volumes:
      - ./logs:/app/logs
      - ./images:/app/images
    restart: unless-stopped
  
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-alarm}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
